<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sensor Gateway — Dashboard</title>

    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0/dist/chartjs-adapter-date-fns.bundle.min.js"></script>

    <style>
        :root {
            --bg-primary:    #0f1419;
            --bg-secondary:  #1a2332;
            --bg-card:       #1e2d3d;
            --border-color:  #2a3a4a;
            --text-primary:  #e1e8f0;
            --text-secondary:#8899aa;
            --text-muted:    #556677;
            --accent-blue:   #3b9eff;
            --accent-green:  #00d68f;
            --accent-orange: #ff9f43;
            --accent-red:    #ff6b6b;
            --accent-cyan:   #00cfdd;
            --font-mono:     'JetBrains Mono', 'Fira Code', 'SF Mono', monospace;
            --font-sans:     'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: var(--font-sans);
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
        }

        /* ── Header ────────────────────────────────────────── */
        .header {
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border-color);
            padding: 16px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .header-left { display: flex; align-items: center; gap: 12px; }
        .header-left h1 { font-size: 18px; font-weight: 600; letter-spacing: -0.02em; }

        .status-dot {
            width: 8px; height: 8px; border-radius: 50%;
            background: var(--accent-green);
            animation: pulse 2s ease-in-out infinite;
        }
        .status-dot.error { background: var(--accent-red); animation: none; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
        .status-text { font-size: 12px; color: var(--text-secondary); font-family: var(--font-mono); }

        /* ── Controls ──────────────────────────────────────── */
        .controls {
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border-color);
            padding: 12px 24px;
            display: flex; align-items: center; gap: 16px; flex-wrap: wrap;
        }
        .control-group { display: flex; align-items: center; gap: 8px; }
        .control-group label {
            font-size: 12px; color: var(--text-secondary);
            text-transform: uppercase; letter-spacing: 0.05em; font-weight: 500;
        }
        select, input[type="number"] {
            background: var(--bg-primary); border: 1px solid var(--border-color);
            color: var(--text-primary); padding: 6px 10px; border-radius: 4px;
            font-family: var(--font-mono); font-size: 13px; outline: none;
            transition: border-color 0.2s;
        }
        select:focus, input:focus { border-color: var(--accent-blue); box-shadow: 0 0 0 2px rgba(59, 158, 255, 0.15); }
        input[type="number"] { width: 64px; text-align: center; }

        .btn {
            padding: 6px 14px; border: 1px solid var(--border-color); border-radius: 4px;
            font-size: 12px; font-weight: 500; cursor: pointer; transition: all 0.15s;
            font-family: var(--font-sans); text-transform: uppercase; letter-spacing: 0.04em;
        }
        .btn-primary { background: var(--accent-blue); color: #fff; border-color: var(--accent-blue); }
        .btn-primary:hover { background: #2b8aee; }
        .btn-danger { background: transparent; color: var(--accent-red); border-color: var(--accent-red); }
        .btn-danger:hover { background: rgba(255, 107, 107, 0.1); }
        .btn-outline { background: transparent; color: var(--text-primary); }
        .btn-outline:hover { background: rgba(255, 255, 255, 0.05); }
        .btn:disabled { opacity: 0.4; cursor: not-allowed; }

        /* ── Main ──────────────────────────────────────────── */
        .main { padding: 24px; max-width: 1200px; margin: 0 auto; }

        /* ── Stats Cards — 5 cards ─────────────────────────── */
        .stats-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 16px; margin-bottom: 24px;
        }
        .stat-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 8px; padding: 16px 20px;
        }
        .stat-label {
            font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em;
            color: var(--text-muted); margin-bottom: 8px; font-weight: 500;
        }
        .stat-value {
            font-family: var(--font-mono); font-size: 28px; font-weight: 700; line-height: 1;
        }
        .stat-value .unit {
            font-size: 14px; font-weight: 400; color: var(--text-secondary); margin-left: 4px;
        }
        .stat-sub {
            font-size: 11px; color: var(--text-muted); margin-top: 6px; font-family: var(--font-mono);
        }

        /* Color variants per metric */
        .stat-card.temp      .stat-value { color: var(--accent-orange); }
        .stat-card.humidity   .stat-value { color: var(--accent-cyan); }
        .stat-card.pressure   .stat-value { color: var(--accent-green); }
        .stat-card.readings   .stat-value { color: var(--accent-blue); }
        .stat-card.status     .stat-value { color: var(--accent-green); }

        /* ── Chart ─────────────────────────────────────────── */
        .chart-container {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 8px; padding: 20px;
        }
        .chart-header {
            display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px;
        }
        .chart-title {
            font-size: 14px; font-weight: 600; color: var(--text-secondary);
            text-transform: uppercase; letter-spacing: 0.05em;
        }
        .chart-wrapper { position: relative; height: 400px; }

        /* ── Responsive ────────────────────────────────────── */
        @media (max-width: 768px) {
            .controls { flex-direction: column; align-items: flex-start; }
            .header { flex-direction: column; gap: 8px; }
            .chart-wrapper { height: 300px; }
        }
    </style>
</head>
<body>

    <header class="header">
        <div class="header-left">
            <h1>Sensor Gateway</h1>
            <span style="color: var(--text-muted); font-size: 12px;">BeagleBone Black - Nguyen Si Phu</span>
        </div>
        <div class="header-left">
            <div class="status-dot" id="statusDot"></div>
            <span class="status-text" id="statusText">Connecting...</span>
        </div>
    </header>

    <div class="controls">
        <div class="control-group">
            <label for="sensorSelect">Sensor Node</label>
            <select id="sensorSelect"><option value="">— Loading —</option></select>
        </div>
        <div class="control-group">
            <label for="limitInput">Data Points</label>
            <input type="number" id="limitInput" value="50" min="10" max="500" step="10">
        </div>
        <div class="control-group">
            <label for="intervalInput">Interval (sec)</label>
            <input type="number" id="intervalInput" value="5" min="1" max="60">
        </div>
        <button class="btn btn-primary" onclick="fetchData()">Update Now</button>
        <button class="btn btn-danger" id="btnStopAuto" onclick="toggleAutoUpdate()">Stop Auto-Update</button>
    </div>

    <div class="main">
        <!-- Stats Cards — 5 cards: Temp, Humidity, Pressure, Readings, Status -->
        <div class="stats-row">
            <div class="stat-card temp">
                <div class="stat-label">Temperature</div>
                <div class="stat-value" id="currentTemp">—<span class="unit">°C</span></div>
                <div class="stat-sub" id="lastUpdateTemp">No data</div>
            </div>
            <div class="stat-card humidity">
                <div class="stat-label">Humidity</div>
                <div class="stat-value" id="currentHumidity">—<span class="unit">%</span></div>
                <div class="stat-sub" id="lastUpdateHumidity">No data</div>
            </div>
            <div class="stat-card pressure">
                <div class="stat-label">Pressure</div>
                <div class="stat-value" id="currentPressure">—<span class="unit">hPa</span></div>
                <div class="stat-sub" id="lastUpdatePressure">No data</div>
            </div>
            <div class="stat-card readings">
                <div class="stat-label">Total Readings</div>
                <div class="stat-value" id="totalReadings">0</div>
                <div class="stat-sub" id="selectedSensor">No sensor selected</div>
            </div>
            <div class="stat-card status">
                <div class="stat-label">Gateway Status</div>
                <div class="stat-value" id="gatewayStatus">—</div>
                <div class="stat-sub" id="sensorCount">0 sensors</div>
            </div>
        </div>

        <!-- Chart -->
        <div class="chart-container">
            <div class="chart-header">
                <span class="chart-title">Sensor History — Temperature · Humidity · Pressure</span>
                <span class="status-text" id="chartStatus"></span>
            </div>
            <div class="chart-wrapper">
                <canvas id="sensorChart"></canvas>
            </div>
        </div>
    </div>

    <script>
    /* ══════════════════════════════════════════════════════════
     * Sensor Gateway Dashboard — Client-side Logic
     *
     * Chart.js dual Y-axis:
     *   Left Y:  Temperature (°C) + Humidity (%)
     *   Right Y: Pressure (hPa)
     *
     * Dual axis rationale:
     *   Temp (20-35) and Humidity (30-70) share a similar scale.
     *   Pressure (1000-1025) is ~30x larger — a single axis would
     *   flatten temp/humidity lines into unreadable noise.
     * ══════════════════════════════════════════════════════════ */

    let chart = null;
    let autoUpdateTimer = null;
    let isAutoUpdating = true;

    const sensorSelect  = document.getElementById('sensorSelect');
    const limitInput    = document.getElementById('limitInput');
    const intervalInput = document.getElementById('intervalInput');
    const statusDot     = document.getElementById('statusDot');
    const statusText    = document.getElementById('statusText');
    const btnStopAuto   = document.getElementById('btnStopAuto');

    /* ── Initialize Chart.js ─────────────────────────────── */

    function initChart() {
        const ctx = document.getElementById('sensorChart').getContext('2d');

        chart = new Chart(ctx, {
            type: 'line',
            data: {
                datasets: [
                    {
                        label: 'Temperature (°C)',
                        data: [],
                        borderColor: '#ff9f43',
                        backgroundColor: 'rgba(255, 159, 67, 0.08)',
                        borderWidth: 2,
                        pointRadius: 2,
                        pointBackgroundColor: '#ff9f43',
                        pointBorderColor: '#1e2d3d',
                        pointBorderWidth: 1,
                        pointHoverRadius: 5,
                        fill: true,
                        tension: 0.3,
                        yAxisID: 'y-left'
                    },
                    {
                        label: 'Humidity (%)',
                        data: [],
                        borderColor: '#00cfdd',
                        backgroundColor: 'rgba(0, 207, 221, 0.08)',
                        borderWidth: 2,
                        pointRadius: 2,
                        pointBackgroundColor: '#00cfdd',
                        pointBorderColor: '#1e2d3d',
                        pointBorderWidth: 1,
                        pointHoverRadius: 5,
                        fill: true,
                        tension: 0.3,
                        yAxisID: 'y-left'
                    },
                    {
                        label: 'Pressure (hPa)',
                        data: [],
                        borderColor: '#00d68f',
                        backgroundColor: 'rgba(0, 214, 143, 0.08)',
                        borderWidth: 2,
                        pointRadius: 2,
                        pointBackgroundColor: '#00d68f',
                        pointBorderColor: '#1e2d3d',
                        pointBorderWidth: 1,
                        pointHoverRadius: 5,
                        fill: true,
                        tension: 0.3,
                        yAxisID: 'y-right'
                    }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                interaction: { intersect: false, mode: 'index' },
                plugins: {
                    legend: {
                        display: true,
                        labels: {
                            color: '#8899aa',
                            font: { family: "'JetBrains Mono', monospace", size: 11 },
                            boxWidth: 12, boxHeight: 2,
                        }
                    },
                    tooltip: {
                        backgroundColor: '#1a2332',
                        titleColor: '#e1e8f0',
                        bodyColor: '#e1e8f0',
                        borderColor: '#2a3a4a',
                        borderWidth: 1,
                        titleFont: { family: "'JetBrains Mono', monospace", size: 11 },
                        bodyFont: { family: "'JetBrains Mono', monospace", size: 12 },
                        padding: 10,
                        displayColors: true,
                        callbacks: {
                            label: function(ctx) {
                                const units = ['°C', '%', 'hPa'];
                                return ` ${ctx.dataset.label}: ${ctx.parsed.y.toFixed(2)} ${units[ctx.datasetIndex]}`;
                            }
                        }
                    }
                },
                scales: {
                    x: {
                        type: 'time',
                        time: {
                            tooltipFormat: 'yyyy-MM-dd HH:mm:ss',
                            displayFormats: {
                                second: 'HH:mm:ss',
                                minute: 'HH:mm',
                                hour: 'HH:mm',
                                day: 'MMM dd'
                            }
                        },
                        ticks: {
                            color: '#556677',
                            font: { family: "'JetBrains Mono', monospace", size: 10 },
                            maxRotation: 0,
                            maxTicksLimit: 10
                        },
                        grid: { color: 'rgba(42, 58, 74, 0.5)', drawBorder: false }
                    },
                    /* Left Y-axis: Temperature + Humidity (similar scale range) */
                    'y-left': {
                        type: 'linear',
                        position: 'left',
                        title: {
                            display: true,
                            text: 'Temp (°C) / Humidity (%)',
                            color: '#8899aa',
                            font: { size: 11 }
                        },
                        ticks: {
                            color: '#556677',
                            font: { family: "'JetBrains Mono', monospace", size: 10 },
                        },
                        grid: { color: 'rgba(42, 58, 74, 0.5)', drawBorder: false }
                    },
                    /* Right Y-axis: Pressure (hPa) — completely different scale */
                    'y-right': {
                        type: 'linear',
                        position: 'right',
                        title: {
                            display: true,
                            text: 'Pressure (hPa)',
                            color: '#00d68f',
                            font: { size: 11 }
                        },
                        ticks: {
                            color: '#00d68f',
                            font: { family: "'JetBrains Mono', monospace", size: 10 },
                        },
                        grid: { drawOnChartArea: false }
                    }
                }
            }
        });
    }

    /* ── Fetch Sensor List ─────────────────────────────────── */

    async function fetchSensors() {
        try {
            const resp = await fetch('/api/sensors');
            if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
            const data = await resp.json();

            setStatus('online', `${data.sensors.length} sensor(s) connected`);
            document.getElementById('sensorCount').textContent = `${data.sensors.length} sensor(s)`;
            document.getElementById('gatewayStatus').textContent = 'Online';
            document.getElementById('gatewayStatus').style.color = 'var(--accent-green)';

            const previousValue = sensorSelect.value;
            sensorSelect.innerHTML = '';

            if (data.sensors.length === 0) {
                sensorSelect.innerHTML = '<option value="">No sensors yet</option>';
                return;
            }

            data.sensors.forEach(id => {
                const opt = document.createElement('option');
                opt.value = id;
                opt.textContent = id;
                sensorSelect.appendChild(opt);
            });

            if (previousValue && data.sensors.includes(previousValue)) {
                sensorSelect.value = previousValue;
            }

            if (sensorSelect.value) fetchData();

        } catch (err) {
            console.error('fetchSensors error:', err);
            setStatus('error', 'Gateway unreachable');
            document.getElementById('gatewayStatus').textContent = 'Offline';
            document.getElementById('gatewayStatus').style.color = 'var(--accent-red)';
        }
    }

    /* ── Fetch Sensor Data ─────────────────────────────────── */

    async function fetchData() {
        const sensorId = sensorSelect.value;
        if (!sensorId) return;

        const limit = parseInt(limitInput.value) || 50;
        const chartStatus = document.getElementById('chartStatus');
        chartStatus.textContent = 'Fetching...';

        try {
            const resp = await fetch(`/api/sensors/${sensorId}/data?limit=${limit}`);
            if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
            const data = await resp.json();

            updateChart(data);
            updateStats(data);
            chartStatus.textContent = `Last fetched: ${new Date().toLocaleTimeString()}`;

        } catch (err) {
            console.error('fetchData error:', err);
            chartStatus.textContent = 'Error fetching data';
        }
    }

    /* ── Update Chart — 3 datasets ─────────────────────────── */

    function updateChart(data) {
        if (!chart || !data.readings) return;

        /* Temperature dataset */
        chart.data.datasets[0].data = data.readings.map(r => ({
            x: new Date(r.timestamp + ' UTC'),
            y: r.temperature
        }));

        /* Humidity dataset */
        chart.data.datasets[1].data = data.readings.map(r => ({
            x: new Date(r.timestamp + ' UTC'),
            y: r.humidity
        }));

        /* Pressure dataset */
        chart.data.datasets[2].data = data.readings.map(r => ({
            x: new Date(r.timestamp + ' UTC'),
            y: r.pressure
        }));

        chart.data.datasets[0].label = `${data.sensor_id} — Temperature (°C)`;
        chart.data.datasets[1].label = `${data.sensor_id} — Humidity (%)`;
        chart.data.datasets[2].label = `${data.sensor_id} — Pressure (hPa)`;

        chart.update();
    }

    /* ── Update Stats Cards ────────────────────────────────── */

    function updateStats(data) {
        const readings = data.readings || [];
        const sensorId = data.sensor_id || '—';

        document.getElementById('selectedSensor').textContent = sensorId;
        document.getElementById('totalReadings').textContent = readings.length;

        if (readings.length > 0) {
            const latest = readings[readings.length - 1];
            const ts = latest.timestamp;

            document.getElementById('currentTemp').innerHTML =
                `${latest.temperature.toFixed(1)}<span class="unit">°C</span>`;
            document.getElementById('lastUpdateTemp').textContent = `Last: ${ts}`;

            document.getElementById('currentHumidity').innerHTML =
                `${latest.humidity.toFixed(1)}<span class="unit">%</span>`;
            document.getElementById('lastUpdateHumidity').textContent = `Last: ${ts}`;

            document.getElementById('currentPressure').innerHTML =
                `${latest.pressure.toFixed(1)}<span class="unit">hPa</span>`;
            document.getElementById('lastUpdatePressure').textContent = `Last: ${ts}`;
        } else {
            document.getElementById('currentTemp').innerHTML = `—<span class="unit">°C</span>`;
            document.getElementById('lastUpdateTemp').textContent = 'No data';
            document.getElementById('currentHumidity').innerHTML = `—<span class="unit">%</span>`;
            document.getElementById('lastUpdateHumidity').textContent = 'No data';
            document.getElementById('currentPressure').innerHTML = `—<span class="unit">hPa</span>`;
            document.getElementById('lastUpdatePressure').textContent = 'No data';
        }
    }

    /* ── Status / Auto-Update / Event Listeners ────────────── */

    function setStatus(state, text) {
        statusDot.className = 'status-dot' + (state === 'error' ? ' error' : '');
        statusText.textContent = text;
    }

    function startAutoUpdate() {
        stopAutoUpdate();
        const interval = (parseInt(intervalInput.value) || 5) * 1000;
        autoUpdateTimer = setInterval(() => { fetchSensors(); }, interval);
        isAutoUpdating = true;
        btnStopAuto.textContent = 'Stop Auto-Update';
        btnStopAuto.className = 'btn btn-danger';
    }

    function stopAutoUpdate() {
        if (autoUpdateTimer) { clearInterval(autoUpdateTimer); autoUpdateTimer = null; }
        isAutoUpdating = false;
        btnStopAuto.textContent = 'Start Auto-Update';
        btnStopAuto.className = 'btn btn-outline';
    }

    function toggleAutoUpdate() {
        if (isAutoUpdating) stopAutoUpdate(); else startAutoUpdate();
    }

    sensorSelect.addEventListener('change', fetchData);
    intervalInput.addEventListener('change', () => { if (isAutoUpdating) startAutoUpdate(); });
    limitInput.addEventListener('change', fetchData);

    document.addEventListener('DOMContentLoaded', () => {
        initChart();
        fetchSensors();
        startAutoUpdate();
    });
    </script>

</body>
</html>
